name: Tests

on:
  schedule:
    # run every Sunday at 10:13 am UTC (3:13 am PT)
    - cron: '13 10 * * 0'
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  import-bapsf_qt:
    name: Importing bapsf_qt
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        os: [ubuntu-latest, windows-latest]
        architecture: [x64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      - name: Upgrade pip
        run: |
          python -m pip install pip --upgrade
      - name: Install 'bapsf_qt' dependencies
        run: |
          python -m pip install -r requirements/install.txt
      - name: Install additional PySide6 dependencies [Linux Systems ONLY]
        if: ${{ runner.os != 'Windows'}}
        run: |
          sudo apt update && sudo apt install -y libegl1-mesa-dev
      - name: Import 'bapsf_qt'
        run: |
          python -c 'import bapsf_qt'

  build-bapsf_qt:
    name: Packaging
    runs-on: ubuntu-latest
    needs:
      - import-bapsf_qt
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Get history and tags for SCM versioning to work
        run: |
          git fetch --prune --unshallow
          git fetch --depth=1 origin +refs/tags/*:refs/tags/*
      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: pip
      - name: Install requirements
        run: |
          pip install --progress-bar off --upgrade pip setuptools setuptools_scm twine build
          pip install --progress-bar off -r requirements/install.txt
      - name: Build a binary wheel
        run: |
          python -m build --wheel --outdir dist/
      - name: Build a source tarball
        run: |
          python -m build --sdist --outdir dist/
      - name: Twine check
        run: |
          twine check dist/*
      - name: Install bapsf_qt in all variants
        run: |
          pip install --progress-bar off .[install]
          pip install --progress-bar off -e .[install]
